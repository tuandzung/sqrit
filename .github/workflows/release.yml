name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  extract-changelog:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.extract.outputs.body }}
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: extract
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          VERSION="${TAG_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          BODY=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{found=0} found" CHANGELOG.md)
          {
            echo "body<<EOFMARKER"
            echo "$BODY"
            echo "EOFMARKER"
          } >> "$GITHUB_OUTPUT"

  build-linux:
    needs: extract-changelog
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        run: cargo install cross --locked

      - name: Build
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../sqrit-${{ matrix.target }}.tar.gz sqrit

      - uses: actions/upload-artifact@v4
        with:
          name: sqrit-${{ matrix.target }}
          path: sqrit-${{ matrix.target }}.tar.gz

  build-macos:
    needs: extract-changelog
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../sqrit-${{ matrix.target }}.tar.gz sqrit

      - uses: actions/upload-artifact@v4
        with:
          name: sqrit-${{ matrix.target }}
          path: sqrit-${{ matrix.target }}.tar.gz

  publish:
    needs: [extract-changelog, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: sqrit ${{ needs.extract-changelog.outputs.version }}
          body: ${{ needs.extract-changelog.outputs.body }}
          files: artifacts/*.tar.gz
