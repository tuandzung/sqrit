name: Integration

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  DATABASE_URL: postgres://sqrit:sqrit@localhost:15432/sqrit_test
  MYSQL_URL: mysql://sqrit:sqrit@localhost:13306/sqrit_test

jobs:
  integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sqrit
          POSTGRES_PASSWORD: sqrit
          POSTGRES_DB: sqrit_test
        ports: ["15432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      mysql:
        image: mysql:8
        env:
          MYSQL_USER: sqrit
          MYSQL_PASSWORD: sqrit
          MYSQL_DATABASE: sqrit_test
          MYSQL_ROOT_PASSWORD: root
        ports: ["13306:3306"]
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --locked

      - name: Run all tests (including ignored integration tests)
        run: cargo test --locked -- --include-ignored
